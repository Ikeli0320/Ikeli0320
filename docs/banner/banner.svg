<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Ikeli banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bg)"/>
  <!-- 角落裝飾線 -->
  <line x1="40" y1="40" x2="120" y2="40" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1080" y1="240" x2="1160" y2="240" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <!-- 主標題 -->
  <text x="60" y="130" font-family="-apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif" font-size="56" font-weight="800" fill="#f8fafc">Ikeli</text>
  <text x="60" y="180" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="url(#accent)">AI Full-Stack Developer · Vibe Coding Practitioner · Founder of Mltech</text>
  <!-- 副標 / 標籤 -->
  <text x="60" y="225" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#94a3b8">Claude Code  ·  Cursor Agent  ·  MCP  ·  Cloudflare Workers  ·  FastAPI  ·  React</text>
  <!-- 右側裝飾：終端機提示符 -->
  <text x="1140" y="155" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#64748b">$ ship --human-readable</text>
</svg>
